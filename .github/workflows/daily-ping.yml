# .github/workflows/render-ping.yml
name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes, UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render site
        run: |
          curl -L -fsS --retry 3 --max-time 20 https://pdts-im.onrender.com/login > /dev/null
