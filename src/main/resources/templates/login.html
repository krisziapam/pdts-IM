<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUP PDTS — Sign In</title>

    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}" href="/assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/assets/favicon-32x32.png}" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/assets/favicon-16x16.png}" href="/assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/assets/apple-touch-icon.png}" href="/assets/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css">

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background:
                linear-gradient(rgba(60, 0, 0, 0.72), rgba(60, 0, 0, 0.72)),
                var(--login-bg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        #login-page {
            min-height: 100vh;
            backdrop-filter: blur(1px);
        }
    </style>
</head>

<body>
<main id="login-page">
    <section class="login-brand">
        <img th:src="@{/assets/logo.png}" src="/assets/logo.png" alt="PUP Seal" class="login-seal">

        <h1>Polytechnic University<br>of the Philippines</h1>

        <p>"Mula sa'yo, para sa bayan"</p>

        <div class="login-system-card">
            <strong>PDTS</strong>
            <span>PUPOUS Document Tracking System</span>
        </div>
    </section>

    <section class="login-panel">
        <div class="login-card">
            <h2>Welcome Back</h2>

            <p class="login-subtitle">Sign in to your Registrar account</p>

            <div th:if="${loginError}" class="alert alert-error" th:text="${loginError}">
                Invalid credentials.
            </div>

            <div th:if="${logoutMessage}" class="alert alert-info" th:text="${logoutMessage}">
                You have been signed out.
            </div>

            <form th:action="@{/login}" method="post">
                <label>
                    Employee ID
                    <input type="text" name="username" autocomplete="username" required>
                </label>

                <label>
                    Password
                    <input type="password" name="password" autocomplete="current-password" required>
                </label>

                <button type="submit">Sign In</button>
            </form>

            <p class="office-note">PUP Registrar's Office</p>
        </div>
    </section>
</main>

<script th:src="@{/js/login.js}" src="/js/login.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const backgrounds = [
            "/assets/login-bg/login-1.png",
            "/assets/login-bg/login-2.png",
            "/assets/login-bg/login-3.png",
            "/assets/login-bg/login-4.png",
            "/assets/login-bg/login-5.png",
            "/assets/login-bg/login-6.png",
            "/assets/login-bg/login-7.png",
            "/assets/login-bg/login-8.png"
        ];

        const selected = backgrounds[Math.floor(Math.random() * backgrounds.length)];
        document.body.style.setProperty("--login-bg", `url('${selected}')`);
    });
</script>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const backgrounds = [
            "/assets/login-bg/login-1.png",
            "/assets/login-bg/login-2.png",
            "/assets/login-bg/login-3.png",
            "/assets/login-bg/login-4.png",
            "/assets/login-bg/login-5.png",
            "/assets/login-bg/login-6.png",
            "/assets/login-bg/login-7.png",
            "/assets/login-bg/login-8.png"
        ];

        const selected = backgrounds[Math.floor(Math.random() * backgrounds.length)];
        document.documentElement.style.setProperty("--login-bg", `url('${selected}')`);
    });
</script>
    
</body>
</html>
