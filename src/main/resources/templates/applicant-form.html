<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New Applicant</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" href="/css/dashboard.css">
</head>
<body class="modal-form-page">

<div class="modal-form-backdrop">
    <div class="modal-form-card">
        <div class="modal-form-header">
            <h1>Add New Applicant</h1>
            <a th:href="@{/applicants}" class="modal-close-btn" aria-label="Close">&times;</a>
        </div>

        <form th:action="@{/applicants/save}" th:object="${applicant}" method="post" class="modal-applicant-form">

            <!-- PERSONAL INFORMATION -->
            <div class="modal-section">
                <div class="modal-section-title">PERSONAL INFORMATION</div>

                <div class="modal-grid">
                    <div class="form-group">
                        <label>FIRST NAME</label>
                        <input type="text" th:field="*{firstName}" placeholder="Given name">
                    </div>

                    <div class="form-group">
                        <label>MIDDLE NAME</label>
                        <input type="text" th:field="*{middleName}" placeholder="Middle name">
                    </div>

                    <div class="form-group">
                        <label>LAST NAME</label>
                        <input type="text" th:field="*{lastName}" placeholder="Surname">
                    </div>

                    <div class="form-group">
                        <label>SEX</label>
                        <select th:field="*{sex}">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>CIVIL STATUS</label>
                        <select th:field="*{civilStatus}">
                            <option value="Single">Single</option>
                            <option value="Married">Married</option>
                            <option value="Widowed">Widowed</option>
                            <option value="Separated">Separated</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>DATE OF BIRTH</label>
                        <input type="date" th:field="*{birthDate}">
                    </div>

                    <div class="form-group">
                        <label>EMAIL ADDRESS</label>
                        <input type="email" th:field="*{email}" placeholder="student@email.com">
                    </div>

                    <div class="form-group">
                        <label>CONTACT NUMBER</label>
                        <input type="text" th:field="*{contactNumber}" placeholder="09XX-XXX-XXXX">
                    </div>
                </div>
            </div>

            <!-- ADDRESS -->
            <div class="modal-section">
                <div class="modal-section-title">ADDRESS</div>

                <div class="modal-grid">
                    <div class="form-group full-width">
                        <label>HOUSE NUMBER / STREET</label>
                        <input type="text" th:field="*{streetAddress}" placeholder="e.g. 123 Rizal St.">
                    </div>

                    <div class="form-group">
                        <label>BARANGAY</label>
                        <input type="text" th:field="*{barangay}">
                    </div>

                    <div class="form-group">
                        <label>CITY / MUNICIPALITY</label>
                        <input type="text" th:field="*{cityMunicipality}">
                    </div>

                    <div class="form-group">
                        <label>PROVINCE</label>
                        <input type="text" th:field="*{province}">
                    </div>

                    <div class="form-group">
                        <label>REGION</label>
                        <select th:field="*{region}">
                            <option value="">Select Region</option>
                            <option value="Region I">Region I</option>
                            <option value="Region II">Region II</option>
                            <option value="Region III">Region III</option>
                            <option value="NCR">NCR</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>ZIP CODE</label>
                        <input type="text" th:field="*{zipCode}">
                    </div>
                </div>
            </div>

            <!-- ACADEMIC INFORMATION -->
            <div class="modal-section">
                <div class="modal-section-title">ACADEMIC INFORMATION</div>

                <div class="modal-grid">
                    <div class="form-group">
                        <label>CURRICULUM / BACKGROUND</label>
                        <select th:field="*{educationalBackground}">
                            <option value="Senior High School (SHS)">Senior High School (SHS)</option>
                            <option value="Alternative Learning System">Alternative Learning System</option>
                            <option value="College Undergraduate">College Undergraduate</option>
                            <option value="Old Curriculum">Old Curriculum</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>PROGRAM APPLIED</label>
                        <select th:field="*{programId}">
                            <option value="">Select Program</option>
                            <option th:each="program : ${programs}"
                                    th:value="${program.programId}"
                                    th:text="${program.programName}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>CAMPUS</label>
                        <select th:field="*{campusId}">
                            <option value="">Select Campus</option>
                            <option th:each="campus : ${campuses}"
                                    th:value="${campus.campusId}"
                                    th:text="${campus.campusName}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>ENROLLMENT STATUS</label>
                        <select th:field="*{enrollmentStatus}">
                            <option value="Continuing">Continuing</option>
                            <option value="Dismissed">Dismissed</option>
                            <option value="On Leave">On Leave</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>LAST SCHOOL ATTENDED</label>
                        <input type="text" th:field="*{lastSchoolAttended}" placeholder="School name">
                    </div>

                    <div class="form-group">
                        <label>YEAR GRADUATED / COMPLETED</label>
                        <input type="text" th:field="*{yearGraduated}" placeholder="e.g. 2024">
                    </div>

                    <div class="form-group">
                        <label>SHS TRACK</label>
                        <select th:field="*{shsTrack}">
                            <option value="">Select Track</option>
                            <option value="STEM">STEM</option>
                            <option value="ABM">ABM</option>
                            <option value="HUMSS">HUMSS</option>
                            <option value="GAS">GAS</option>
                            <option value="TVL">TVL</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>SHS STRAND</label>
                        <input type="text" th:field="*{shsStrand}">
                    </div>
                </div>
            </div>

            <div class="modal-form-actions">
                <a th:href="@{/applicants}" class="btn-outline">Cancel</a>
                <button type="submit" class="btn-primary">Save Applicant</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
