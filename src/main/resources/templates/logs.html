<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Activity Logs</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body><div class="shell"><aside class="sidebar"><div class="brand"><div class="brand-mark">PUP</div><div><div class="brand-title">Document Tracking System</div><span class="brand-subtitle">Open University System</span></div></div><nav class="nav"><a href="/dashboard">Dashboard</a><a href="/applicants">Applicants</a><a href="/requirements">Documents</a><a href="/users">Staff Accounts</a><a class="active" href="/logs">Activity Logs</a><a href="/logout">Logout</a></nav></aside>
<main class="main"><header class="topbar"><div><h1>Activity Logs</h1><p class="lead">Recent system actions.</p></div></header><table><thead><tr><th>ID</th><th>User</th><th>Action</th><th>Entity</th><th>Description</th><th>Date</th></tr></thead><tbody><tr th:if="${logs.isEmpty()}"><td colspan="6">No activity logs yet.</td></tr><tr th:each="l : ${logs}"><td th:text="${l['user_activity_log_id']}">1</td><td th:text="${l['user_username']}">user</td><td th:text="${l['user_activity_log_action_type']}">action</td><td th:text="${l['user_activity_log_entity_type']}">entity</td><td th:text="${l['user_activity_log_description']}">desc</td><td th:text="${l['user_activity_log_performed_at']}">date</td></tr></tbody></table></main></div></body></html>
