<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Staff</title>

    <!-- Favicon / Browser Tab Icon -->
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/favicon.ico}" href="/favicon.ico">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}" href="/favicon.ico">

    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/assets/favicon-32x32.png}" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/assets/favicon-16x16.png}" href="/assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/assets/apple-touch-icon.png}" href="/assets/apple-touch-icon.png">

    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>
<div class="shell">

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">PUP</div>
            <div>
                <div class="brand-title">Document Tracking System</div>
                <span class="brand-subtitle">Open University System</span>
            </div>
        </div>

        <nav class="nav">
            <a href="/dashboard">Dashboard</a>
            <a href="/users">Staff Accounts</a>
            <a href="/logout">Logout</a>
        </nav>
    </aside>

    <main class="main">

        <header class="topbar">
            <div>
                <h1>New Staff Account</h1>
                <p class="lead">Create a new login account.</p>
            </div>

            <a class="btn secondary" href="/users">Back</a>
        </header>

        <form class="card" method="post" action="/users">
            <div class="form-grid">

                <label>
                    First Name
                    <input name="firstName" required>
                </label>

                <label>
                    Middle Name
                    <input name="middleName">
                </label>

                <label>
                    Last Name
                    <input name="lastName" required>
                </label>

                <label>
                    Email
                    <input type="email" name="email" required>
                </label>

                <label>
                    Username
                    <input name="username" required>
                </label>

                <label>
                    Password
                    <input name="password" type="password" required>
                </label>

                <label>
                    Role
                    <select name="roleId" required>
                        <option th:each="r : ${roles}"
                                th:value="${r['role_id']}"
                                th:text="${r['role_name']}">
                        </option>
                    </select>
                </label>

            </div>

            <div class="section actions">
                <button class="btn" type="submit">Create Staff</button>
                <a class="btn secondary" href="/users">Cancel</a>
            </div>
        </form>

    </main>
</div>
</body>
</html>
