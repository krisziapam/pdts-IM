<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Staff Accounts</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body><div class="shell">
<aside class="sidebar"><div class="brand"><div class="brand-mark">PUP</div><div><div class="brand-title">Document Tracking System</div><span class="brand-subtitle">Open University System</span></div></div><nav class="nav"><a href="/dashboard">Dashboard</a><a href="/applicants">Applicants</a><a href="/requirements">Documents</a><a class="active" href="/users">Staff Accounts</a><a href="/logs">Activity Logs</a><a href="/logout">Logout</a></nav></aside>
<main class="main"><header class="topbar"><div><h1>Staff Accounts</h1><p class="lead">Create accounts and activate/deactivate staff users.</p></div><a class="btn gold" href="/users/new">New Staff</a></header>
<div th:if="${success}" class="flash success" th:text="${success}"></div>
<table><thead><tr><th>ID</th><th>Username</th><th>Name</th><th>Email</th><th>Role</th><th>Active</th><th>Action</th></tr></thead><tbody><tr th:each="u : ${users}"><td th:text="${u['user_id']}">1</td><td th:text="${u['user_username']}">user</td><td th:text="${u['user_first_name'] + ' ' + u['user_last_name']}">Name</td><td th:text="${u['user_email_address']}">email</td><td th:text="${u['role_name']}">role</td><td><span class="badge" th:text="${u['user_is_active'] == 1 ? 'Active' : 'Inactive'}">Active</span></td><td><form method="post" th:action="@{/users/{id}/toggle(id=${u['user_id']})}"><button class="btn secondary" type="submit" th:text="${u['user_is_active'] == 1 ? 'Deactivate' : 'Activate'}">Toggle</button></form></td></tr></tbody></table>
</main></div></body></html>
