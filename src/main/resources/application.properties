spring.application.name=PDTS

# ── Database (Supabase PostgreSQL / Render) ───────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# Tables are created by SQL scripts. Use none to avoid strict JPA validation issues during demo.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/

# Render / reverse proxy support
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.redirect-context-root=false

# ── File Upload (Para sa Tracking Documents) ──────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Important for Render Free:
# Uploaded files saved locally may disappear after restart/redeploy.
pdts.upload-dir=uploads

# ── PDTS Application Settings ─────────────────────────────────
pdts.bcrypt-strength=10
pdts.token-expiry-days=30
pdts.portal.rate-limit=10
pdts.portal.block-after-failures=5
pdts.portal.block-window-minutes=15
pdts.portal.block-duration-minutes=30

# ── Email (SMTP) ──────────────────────────────────────────────
# Demo values only. Replace with real Gmail App Password if email sending is needed.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
