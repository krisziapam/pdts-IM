spring.application.name=PDTS

# ── Database (Supabase PostgreSQL / Render) ───────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:10000}
server.address=0.0.0.0
server.servlet.context-path=/

# Render / reverse proxy support
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.redirect-context-root=false

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
pdts.upload-dir=uploads

# ── PDTS Application Settings ─────────────────────────────────
pdts.bcrypt-strength=10
pdts.token-expiry-days=30
pdts.portal.rate-limit=10
pdts.portal.block-after-failures=5
pdts.portal.block-window-minutes=15
pdts.portal.block-duration-minutes=30

# ── Email (Resend HTTP API) ───────────────────────────────────
resend.api-key=${RESEND_API_KEY}
resend.from-email=${RESEND_FROM_EMAIL:PDTS Registrar <onboarding@resend.dev>}

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
