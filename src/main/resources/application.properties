spring.application.name=PDTS

# ── Database (PostgreSQL) ─────────────────────────────────────
# Create the database first, then run database/01_schema.sql and database/02_seed.sql.
spring.datasource.url=jdbc:postgresql://localhost:5432/pdts_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# Tables are created by SQL scripts. Use none to avoid strict JPA validation issues during demo.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Server ────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# ── File Upload (Para sa Tracking Documents) ──────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── PDTS Application Settings ─────────────────────────────────
pdts.upload-dir=uploads
pdts.bcrypt-strength=10
pdts.token-expiry-days=30
pdts.portal.rate-limit=10
pdts.portal.block-after-failures=5
pdts.portal.block-window-minutes=15
pdts.portal.block-duration-minutes=30

# ── Email (SMTP) ──────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
